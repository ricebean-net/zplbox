
---
stages:
  - validate
  - build
  - deploy
  - cleanup

variables:
  GITLAB_REPO: ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}
  PROJECT_NAME: ${CI_PROJECT_NAME}
  VERSION: 1.0.${CI_PIPELINE_IID}

  TF_VAR_gcp_project_id: "zplbox-com"
  TF_VAR_gcp_region: "europe-west1"
  TF_VAR_service_name: "zplbox"
  TF_VAR_gitlab_image_name: "europe-west1-docker.pkg.dev/zplbox-com/gitlab-images/ricebean.net/${CI_PROJECT_NAME}/${CI_PROJECT_NAME}:${VERSION}"
  TF_VAR_rapidapi_secret: $RAPID_API_SECRET

  GOOGLE_APPLICATION_CREDENTIALS: "$GOOGLE_APPLICATION_CREDENTIALS_JSON"

include:
  - component: $CI_SERVER_FQDN/components/opentofu/full-pipeline@2.13.0
    inputs:
      root_dir: 'iac/'
      state_name: 'cloud-run'
      apply_rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          when: on_success
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'

.build:
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - >
      docker build
      --file Dockerfile.rapidapi
      --tag ${GITLAB_REPO}/${PROJECT_NAME}:${VERSION}
      --build-arg VERSION=${VERSION}
      --build-arg COMMIT_SHA=${CI_COMMIT_SHA}
      --build-arg COMMIT_SHORT_SHA=${CI_COMMIT_SHORT_SHA}
      --build-arg PIPELINE_ID=${CI_PIPELINE_ID}
      --build-arg PIPELINE_IID=${CI_PIPELINE_IID}
      --build-arg USER_NAME=${GITLAB_USER_LOGIN}
      .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD ${GITLAB_REPO}
    - docker push ${GITLAB_REPO}/${PROJECT_NAME}:${VERSION}

# build (test & production)
test-build:
  extends: .build
  stage: validate
  rules:
    - if: $CI_COMMIT_BRANCH != "main" && $CI_PIPELINE_SOURCE != 'merge_request_event'
  before_script:
    - VERSION=${VERSION}-dev

prod-build:
  extends: .build
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"



