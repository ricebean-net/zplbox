# The Terraform deployment stage
deploy-to-gcp:
  stage: deploy
  image:
    name: registry.gitlab.com/gitlab-org/terraform-images/stable:latest
    entrypoint:
      - /usr/bin/env
      - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  variables:
    # Set the backend to use GCS for state management
    TF_VAR_gcp_project_id: "zplbox-com" # CHANGE THIS
    TF_VAR_gcp_region: "europe-west1"         # CHANGE THIS
    TF_VAR_service_name: "zplbox" # CHANGE THIS
    TF_VAR_gitlab_image_name: "registry.gitlab.com/ricebean.net/zplbox/zplbox:1.0.4"
#    TF_VAR_gitlab_image_name: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  script:
    - cd iac
    - terraform init
    - terraform validate
    - terraform plan -out=tfplan
    - terraform apply -auto-approve tfplan
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
