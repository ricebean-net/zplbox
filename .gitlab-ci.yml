
---
stages:
  - validate
  - build
  - deploy
  - destroy




# The OpenTofu component that handles validation, planning, and applying
include:
  - component: $CI_SERVER_FQDN/components/opentofu/validate-plan-apply@2.13.0
    inputs:
      opentofu_version: 1.10.3
      root_dir: 'iac/'
      state_name: 'cloud-run'
      apply_rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          when: on_success

variables:
  TF_VAR_gcp_project_id: "zplbox-com" # CHANGE THIS
  TF_VAR_gcp_region: "europe-west1"         # CHANGE THIS
  TF_VAR_service_name: "zplbox" # CHANGE THIS
  TF_VAR_gitlab_image_name: "europe-west1-docker.pkg.dev/zplbox-com/gitlab-images/ricebean.net/zplbox/zplbox:1.0.4"
  GOOGLE_APPLICATION_CREDENTIALS: "$GOOGLE_APPLICATION_CREDENTIALS_JSON"

