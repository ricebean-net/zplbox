publish_to_github:
  stage: deploy
  image: python:3.9-slim
  script:
    # 1. Install dependencies: git and the filter tool.
    - apt-get update && apt-get install -y git
    - pip install git-filter-repo

    # 2. Clone the full enterprise repo using a special CI token.
    #    This is more reliable than using a shallow clone.
    - git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" public_repo
    - cd ${CI_PROJECT_NAME}

    # 3. Configure git user for the new commits.
    - git config user.name "ricebean.net Code Publisher"
    - git config user.email "noreply@ricebean.net"

    # 4. THIS IS THE FILTERING STEP!
    #    Rewrite the history to KEEP only the paths you want public.
    #    Add all the files and folders you want to sync here.
    - git filter-repo --invert-paths --paths-from-file .github-exclude-paths.txt

    # 5. Add the public GitHub repository as a remote named 'community'.
    #    Replace <USERNAME> and <REPONAME> with your GitHub details.
    #    We use the GITHUB_PAT variable for authentication.
    - git remote add community "https://oauth2:${GITHUB_PAT}@github.com/<USERNAME>/<REPONAME>.git"

    # 6. Force-push the rewritten history to the main branch on GitHub.
    #    The '--all' flag pushes all branches, but since we cloned fresh, it's just 'main'.
    #    '-f' is required because the history is different each time.
    - git push -f --all community

  # This rule ensures the job ONLY runs on pushes to the 'main' branch.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'