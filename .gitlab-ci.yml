destroy:
  stage: destroy
  image:
    name: registry.gitlab.com/components/opentofu/gitlab-opentofu:1.10.3-1 # You must specify the OpenTofu image
  when: manual # IMPORTANT: This makes the job a manual trigger
  script:
    - cd $CI_PROJECT_DIR/iac/
    - opentofu init
    - opentofu destroy -auto-approve
  dependencies:
    - apply # This ensures the job has access to the state file from the apply job
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'